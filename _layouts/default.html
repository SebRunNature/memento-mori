<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

  <!-- Open Graph -->
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta property="og:site_name" content="{{ site.title }}">

  <!-- Canonical -->
  <link rel="canonical" href="{{ site.url }}{{ page.url }}">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --green: #2d9e72; --green-dk: #1a6b4a; --green-lt: #a8f0d0;
      --bg: #0a0f0c; --card: #131a16; --card2: #1a2620;
      --text: #e8f5f0; --muted: #5a8a7a; --border: #243028;
      --radius: 14px; --amber: #c8873a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,15,12,.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px; display: flex; align-items: center; justify-content: space-between;
      height: 56px;
    }
    .nav-brand {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem;
      letter-spacing: 2px; color: var(--green-lt); text-decoration: none;
      display: flex; align-items: center; gap: 8px;
    }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a {
      font-size: .8rem; font-weight: 800; letter-spacing: .08em;
      text-transform: uppercase; color: var(--muted); text-decoration: none;
      transition: color .2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--green-lt); }

    /* ── MAIN ── */
    main { width: 100%; max-width: 720px; margin: 0 auto; padding: 48px 24px 80px; }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border); text-align: center;
      padding: 28px 24px; font-size: .72rem; color: var(--muted); font-weight: 700;
    }
    footer a { color: var(--green); text-decoration: none; }
    footer a:hover { color: var(--green-lt); }

    /* ── BLOG LIST ── */
    .post-list { display: flex; flex-direction: column; gap: 20px; margin-top: 32px; }
    .post-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 22px 24px; text-decoration: none; color: var(--text);
      transition: border-color .2s; display: block;
    }
    .post-card:hover { border-color: var(--green); }
    .post-card-date { font-size: .65rem; font-weight: 800; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .post-card-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 1px; color: var(--green-lt); margin-bottom: 8px; }
    .post-card-excerpt { font-size: .88rem; color: var(--muted); line-height: 1.6; font-weight: 600; }

    /* ── ARTICLE ── */
    article h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2rem,5vw,3rem); letter-spacing: 2px; color: var(--text); margin-bottom: 12px; }
    article h1 em { color: var(--green-lt); font-style: normal; }
    article .post-meta { font-size: .7rem; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 36px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
    article h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 2px; color: var(--green-lt); margin: 36px 0 14px; }
    article p { font-size: 1rem; line-height: 1.8; color: rgba(232,245,240,.8); margin-bottom: 18px; font-weight: 600; }
    article a { color: var(--green-lt); }
    article ul, article ol { padding-left: 22px; margin-bottom: 18px; }
    article li { font-size: 1rem; line-height: 1.8; color: rgba(232,245,240,.8); font-weight: 600; margin-bottom: 6px; }
    article blockquote { border-left: 3px solid var(--green); padding: 12px 18px; margin: 24px 0; background: rgba(45,158,114,.06); border-radius: 0 10px 10px 0; }
    article blockquote p { color: var(--green-lt); font-style: italic; margin: 0; }

    /* ── CTA MONTRE ── */
    .cta-montre {
      background: linear-gradient(135deg, rgba(26,107,74,.3), rgba(45,158,114,.15));
      border: 1px solid rgba(45,158,114,.3); border-radius: var(--radius);
      padding: 28px 24px; text-align: center; margin: 40px 0;
    }
    .cta-montre p { font-size: .9rem; color: var(--muted); margin-bottom: 16px; }
    .cta-montre a {
      display: inline-block;
      background: linear-gradient(135deg, var(--green-dk), var(--green));
      color: #fff; text-decoration: none; padding: 14px 36px;
      font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 3px;
      border-radius: 12px; transition: all .2s;
      box-shadow: 0 4px 20px rgba(45,158,114,.3);
    }
    .cta-montre a:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(45,158,114,.45); }

    @media(max-width: 600px) {
      nav { padding: 0 16px; }
      .nav-links { gap: 14px; }
      main { padding: 32px 16px 60px; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="/">
    ⏱ Montre de Vie
  </a>
  <div class="nav-links">
    <a href="/montre/" {% if page.url contains '/montre' %}class="active"{% endif %}>La montre</a>
    <a href="/blog/" {% if page.url contains '/blog' %}class="active"{% endif %}>Blog</a>
    <a href="/apropos/" {% if page.url contains '/apropos' %}class="active"{% endif %}>À propos</a>
  </div>
</nav>

<main>
  {{ content }}
</main>

<footer>
  <p>© {{ 'now' | date: '%Y' }} <a href="https://run-nature.com" target="_blank">Run Nature</a> — Sébastien Salomon &nbsp;·&nbsp; <a href="/montre/">Lancer la montre</a> &nbsp;·&nbsp; <a href="/apropos/">À propos</a></p>
  <p style="margin-top:8px;font-size:.65rem;opacity:.6">Outil indicatif, non médical. Chaque seconde compte — ne la gâche pas.</p>
</footer>

</body>
</html>
