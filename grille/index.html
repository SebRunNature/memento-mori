<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ta vie en semaines — Montre de Vie</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --green:#2d9e72;--green-dk:#1a6b4a;--green-lt:#a8f0d0;
  --bg:#0a0f0c;--card:#131a16;--card2:#1a2620;
  --text:#e8f5f0;--muted:#5a8a7a;--border:#243028;
  --radius:14px;--sq-size:9px;--sq-gap:2px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}

.bg{position:fixed;inset:0;z-index:0}
.bg svg{width:100%;height:100%;object-fit:cover}
.bg-overlay{position:fixed;inset:0;z-index:1;
  background:linear-gradient(to bottom,rgba(10,15,12,.35) 0%,rgba(10,15,12,.1) 40%,rgba(10,15,12,.6) 75%,rgba(10,15,12,.92) 100%)}

#app{position:relative;z-index:2;width:100%;max-width:700px;margin:0 auto;padding:36px 14px 80px;animation:fadeUp .8s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* HEADER */
.eyebrow{font-size:.75rem;letter-spacing:.3em;color:var(--green);text-transform:uppercase;font-weight:800;margin-bottom:8px;text-align:center}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,6vw,3rem);letter-spacing:2px;color:var(--text);text-align:center;margin-bottom:6px}
h1 em{color:var(--green-lt);font-style:normal}
.sub{font-size:.82rem;color:var(--muted);font-weight:600;line-height:1.6;text-align:center;margin-bottom:20px}

/* QUICK STATS */
.quick-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.qs-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center}
.qs-val{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--green-lt);display:block;line-height:1}
.qs-lbl{font-size:.56rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:4px;display:block}

/* LÉGENDE */
.legend{display:flex;align-items:center;gap:14px;margin-bottom:10px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:.68rem;font-weight:800;color:var(--muted);text-transform:uppercase}
.legend-sq{width:10px;height:10px;border-radius:1.5px;flex-shrink:0}

/* GRILLE — centré, pas de débordement */
.grid-wrapper{width:100%;margin-bottom:20px}
.grid-section{display:flex;flex-direction:column;align-items:flex-start;width:fit-content;margin:0 auto}

.grid-year-row{display:flex;align-items:center;gap:var(--sq-gap);height:calc(var(--sq-size) + 1px)}
.grid-year-row.gap-5{margin-top:4px}

.grid-year-label{
  font-family:'Bebas Neue',sans-serif;font-size:.6rem;
  color:rgba(168,240,208,.2);letter-spacing:.5px;
  width:22px;flex-shrink:0;text-align:right;padding-right:3px;
}
.grid-year-label.visible{color:rgba(168,240,208,.55);font-size:.68rem}

.grid-weeks{display:flex;flex-wrap:nowrap;gap:var(--sq-gap)}

.sq{width:var(--sq-size);height:var(--sq-size);border-radius:1px;flex-shrink:0}
.sq-done{background:#1a6b4a}
.sq-current{background:#a8f0d0;box-shadow:0 0 4px rgba(168,240,208,.6)}
.sq-left{background:#131a16;border:1px solid #1e2b22}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sq-current{animation:pulse 2s ease infinite}

/* CITATION */
.citation{background:rgba(45,158,114,.06);border-left:3px solid var(--green);
  border-radius:0 10px 10px 0;padding:13px 16px;margin:20px 0;
  font-style:italic;font-size:.86rem;color:rgba(168,240,208,.5);line-height:1.7;font-weight:600}

/* STATS */
.life-stats-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;
  color:var(--green-lt);border-bottom:1px solid var(--border);padding-bottom:7px;margin-bottom:12px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px 11px}
.stat-card .s-val{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--green-lt);display:block;letter-spacing:1px;line-height:1}
.stat-card .s-lbl{font-size:.62rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:4px;display:block}
.stat-card .s-sub{font-size:.68rem;color:rgba(168,240,208,.35);font-weight:600;margin-top:2px}
.stat-card-trail{border-color:rgba(45,158,114,.3);background:rgba(45,158,114,.05)}
.stat-card-trail .s-val{color:#a8f0d0}

/* BOUTONS */
.btns-wrap{display:flex;gap:10px}
.btn-main{
  flex:1;text-align:center;
  background:linear-gradient(135deg,var(--green-dk),var(--green));
  color:#fff;text-decoration:none;padding:14px 10px;
  font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;
  border-radius:12px;transition:all .2s;box-shadow:0 4px 16px rgba(45,158,114,.3);
  border:none;cursor:pointer;display:block;
}
.btn-main:hover{transform:translateY(-2px)}
.btn-secondary{
  flex:1;text-align:center;
  background:rgba(45,158,114,.15);border:1px solid rgba(45,158,114,.4);
  color:var(--green-lt);text-decoration:none;padding:14px 10px;
  font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;
  border-radius:12px;transition:all .2s;display:block;
}
.btn-secondary:hover{background:rgba(45,158,114,.3);border-color:var(--green);color:#fff}

/* NO DATA */
.no-data{text-align:center;padding:60px 20px;color:var(--muted)}
.no-data h2{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--green-lt);margin-bottom:12px;letter-spacing:2px}
.no-data p{font-size:.88rem;font-weight:600;line-height:1.7;margin-bottom:20px}

@media(max-width:360px){
  .stats-grid{grid-template-columns:1fr}
  .btns-wrap{flex-direction:column}
  .quick-stats{grid-template-columns:1fr 1fr}
  .quick-stats .qs-card:last-child{grid-column:span 2}
}
</style>
</head>
<body>

<div class="bg">
<svg viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="sunGlow" cx="35%" cy="38%" r="30%">
      <stop offset="0%" stop-color="#2d9e72" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0a0f0c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060e09"/>
      <stop offset="45%" stop-color="#0d1f15"/>
      <stop offset="100%" stop-color="#0a0f0c"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="900" fill="url(#skyGrad)"/>
  <ellipse cx="504" cy="342" rx="430" ry="270" fill="url(#sunGlow)"/>
  <path d="M0,480 Q80,330 180,380 Q260,290 360,350 Q440,280 530,340 Q620,260 720,320 Q810,250 900,310 Q990,240 1080,295 Q1160,230 1250,280 Q1330,250 1440,290 L1440,900 L0,900 Z" fill="#0c1610" opacity="0.9"/>
  <path d="M0,560 Q90,420 200,470 Q300,390 400,450 Q490,400 580,455 Q670,380 770,440 Q850,390 950,445 Q1040,395 1140,450 Q1220,400 1320,440 Q1380,415 1440,440 L1440,900 L0,900 Z" fill="#111e16" opacity="0.95"/>
  <path d="M0,720 Q200,680 400,700 Q600,720 720,690 Q900,660 1100,680 Q1280,695 1440,670 L1440,900 L0,900 Z" fill="#0d1610" opacity="0.95"/>
</svg>
</div>
<div class="bg-overlay"></div>

<div id="app">
  <div id="content"></div>
</div>

<script>
function getParams(){
  var p=new URLSearchParams(window.location.search);
  return{age:parseInt(p.get('age'))||0,esperance:parseInt(p.get('esperance'))||0,trail:parseFloat(p.get('trail'))||2};
}
function fmt(n){return Math.round(n).toLocaleString('fr-FR')}

var citations=[
  {txt:'Tu pourrais quitter la vie l\'instant même. Laisse cela déterminer ce que tu fais, dis et penses.',aut:'Marc Aurèle'},
  {txt:'Ce n\'est pas que nous ayons peu de temps à vivre, c\'est que nous en perdons beaucoup.',aut:'Sénèque'},
  {txt:'Vis comme si tu mourais à chaque instant — parce que c\'est exactement ce qui se passe.',aut:'Marc Aurèle'},
  {txt:'La mort sourit à tout le monde. Tout ce qu\'un homme peut faire, c\'est lui sourire en retour.',aut:'Marc Aurèle'},
  {txt:'Pendant que tu repousses ta vie, elle passe.',aut:'Sénèque — Lettres à Lucilius'},
  {txt:'La vie n\'est pas courte. C\'est nous qui la gaspillons.',aut:'Sénèque'},
  {txt:'Il n\'y a qu\'une seule façon de vivre longtemps — ne plus gaspiller une seule journée.',aut:'Épictète'},
  {txt:'Chaque foulée compte. Chaque seconde aussi.',aut:'Sébastien Salomon — Run Nature'},
  {txt:'Le moment présent aura toujours été.',aut:'Philosophie stoïcienne'},
  {txt:'N\'agis pas comme si tu avais dix mille ans devant toi.',aut:'Marc Aurèle'},
];

function calcSqSize(){
  var w=window.innerWidth;
  var padding=28;
  var labelW=25;
  var gap=2;
  var weeks=52;
  var available=w-padding-labelW-(gap*weeks);
  var sq=Math.floor(available/weeks);
  return Math.max(4,Math.min(sq,11));
}

function render(){
  var p=getParams();
  var c=document.getElementById('content');
  if(!p.age||!p.esperance){
    c.innerHTML=`<div class="no-data"><h2>Données manquantes</h2><p>Lance d'abord la montre de vie pour générer ta grille personnalisée.</p><div class="btns-wrap" style="max-width:300px;margin:0 auto"><a href="https://montre-de-vie.com/montre/" class="btn-main">⏱ Lancer la montre</a><a href="https://montre-de-vie.com/" class="btn-secondary">🏠 Accueil</a></div></div>`;
    return;
  }

  var totalW=Math.round(p.esperance*52.18);
  var livedW=Math.round(p.age*52.18);
  var leftW=Math.max(totalW-livedW,0);
  var pct=Math.round((livedW/totalW)*100);
  var leftY=Math.max(p.esperance-p.age,0);
  var joursV=Math.round(p.age*365.25);
  var joursR=Math.round(leftW*7);
  var weR=Math.round(leftY*52);
  var etesR=Math.round(leftY);
  var trailR=Math.round(leftW*p.trail);
  var cite=citations[Math.floor(Math.random()*citations.length)];

  c.innerHTML=`
    <div class="eyebrow">Memento Mori — Run Nature</div>
    <h1>Ta vie en <em>semaines</em></h1>
    <p class="sub">Chaque carré = 1 semaine · ${fmt(totalW)} semaines au total · ${pct}% vécues</p>

    <div class="quick-stats">
      <div class="qs-card"><span class="qs-val">${fmt(livedW)}</span><span class="qs-lbl">Semaines vécues</span></div>
      <div class="qs-card"><span class="qs-val">${fmt(leftW)}</span><span class="qs-lbl">Restantes</span></div>
      <div class="qs-card"><span class="qs-val">${pct}%</span><span class="qs-lbl">Vie vécue</span></div>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-sq" style="background:#1a6b4a"></div>Vécue</div>
      <div class="legend-item"><div class="legend-sq" style="background:#a8f0d0"></div>En cours</div>
      <div class="legend-item"><div class="legend-sq" style="background:#131a16;border:1px solid #243028"></div>Restante</div>
    </div>

    <div class="citation">"${cite.txt}"<br><span style="font-size:.68rem;opacity:.6;font-style:normal">— ${cite.aut}</span></div>

    <div class="grid-wrapper"><div class="grid-section" id="gc"></div></div>

    <div class="life-stats-title">📊 Ta vie en chiffres</div>
    <div class="stats-grid">
      <div class="stat-card"><span class="s-val">${fmt(joursV)}</span><span class="s-lbl">Jours vécus</span><span class="s-sub">${p.age} ans et quelques poussières</span></div>
      <div class="stat-card"><span class="s-val">${fmt(joursR)}</span><span class="s-lbl">Jours restants</span><span class="s-sub">Si tu continues comme ça 🏔️</span></div>
      <div class="stat-card"><span class="s-val">${fmt(weR)}</span><span class="s-lbl">Week-ends restants</span><span class="s-sub">Ça fait mal à lire 😅</span></div>
      <div class="stat-card"><span class="s-val">${fmt(etesR)}</span><span class="s-lbl">Étés restants</span><span class="s-sub">Chaque saison compte</span></div>
      <div class="stat-card stat-card-trail"><span class="s-val">${fmt(trailR)}</span><span class="s-lbl">Sorties trail restantes</span><span class="s-sub">À ${p.trail} sorties/semaine</span></div>
      <div class="stat-card stat-card-trail"><span class="s-val">${fmt(Math.round(trailR*12))}</span><span class="s-lbl">Km de sentiers</span><span class="s-sub">~12km/sortie</span></div>
    </div>

    <div class="btns-wrap">
      <a href="https://montre-de-vie.com/montre/" class="btn-main">↺ Saisir à nouveau</a>
      <a href="https://montre-de-vie.com/" class="btn-secondary">🏠 Accueil</a>
    </div>
  `;
  // Bouton retour résultats — localStorage permet de retrouver les résultats directement
  // Le lien "Saisir à nouveau" pointe vers la montre — le localStorage la ramènera aux résultats

  buildGrid(p.esperance, livedW, totalW);
}

function buildGrid(esperance, livedW, totalW){
  var gc=document.getElementById('gc');
  if(!gc)return;
  var sq=calcSqSize();
  document.documentElement.style.setProperty('--sq-size',sq+'px');

  // D'abord on génère tous les carrés en "left" (vide)
  var html='';
  var wk=0;
  for(var yr=0;yr<esperance;yr++){
    var is5=(yr>0&&yr%5===0);
    var showLbl=(yr===0||yr%5===0);
    html+='<div class="grid-year-row'+(is5?' gap-5':'')+'">';
    html+='<div class="grid-year-label'+(showLbl?' visible':'')+'">'+(showLbl?yr:'')+'</div>';
    html+='<div class="grid-weeks">';
    for(var w=0;w<52;w++){
      wk++;
      // Tous commencent vides — l'animation les allumera
      var cls = wk===livedW ? 'sq sq-current' : 'sq sq-left';
      html+='<div class="'+cls+'" data-week="'+wk+'"></div>';
    }
    html+='</div></div>';
  }
  gc.innerHTML=html;

  // Animation : remplir les carrés vécus en 2 secondes
  if(livedW > 0){
    var delay = 2000 / livedW; // ms par carré
    delay = Math.max(delay, 1); // minimum 1ms
    var squares = gc.querySelectorAll('.sq-left, .sq-current');
    var i = 0;
    function fillNext(){
      if(i >= squares.length) return;
      var sq = squares[i];
      var week = parseInt(sq.getAttribute('data-week'));
      if(week < livedW){
        sq.classList.remove('sq-left');
        sq.classList.add('sq-done');
        i++;
        setTimeout(fillNext, delay);
      }
    }
    setTimeout(fillNext, 300); // petit délai avant de démarrer
  }
}

window.addEventListener('DOMContentLoaded',render);
window.addEventListener('resize',function(){
  var sq=calcSqSize();
  document.documentElement.style.setProperty('--sq-size',sq+'px');
});

</script>
