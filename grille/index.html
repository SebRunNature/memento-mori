<style>
:root{
  --bg:#09090b;--card:#18181b;--card2:#27272a;
  --text:#e4e4e7;--muted:#71717a;--dim:#52525b;
  --border:#27272a;--border2:#3f3f46;
  --green:#009862;--green-dk:#006b44;--green-lt:#a0facf;
  --amber:#f59e0b;--amber-dk:#d97706;--amber-lt:#fde68a;
  --radius:14px;--sq-size:9px;--sq-gap:2px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);color:var(--text);overflow-x:hidden;
  -webkit-font-smoothing:antialiased}

/* NAV FIXE */
.gr-nav{position:fixed;top:0;left:0;right:0;z-index:99;
  background:rgba(9,9,11,.92);backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.gr-nav-inner{max-width:1024px;margin:0 auto;padding:0 24px;height:60px;
  display:flex;align-items:center;justify-content:space-between}
.gr-nav-brand{display:flex;align-items:center;gap:10px;font-size:1rem;font-weight:700;
  letter-spacing:-.02em;color:var(--text);text-decoration:none;transition:color .2s}
.gr-nav-brand:hover{color:#fff}
.gr-nav-icon{width:26px;height:26px;background:var(--amber);border-radius:7px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.gr-nav-icon svg{width:14px;height:14px;stroke:#000}
.gr-nav-links{display:flex;align-items:center;gap:2px}
.gr-nav-link{font-size:.875rem;font-weight:500;color:var(--muted);text-decoration:none;
  padding:6px 12px;border-radius:8px;transition:all .2s}
.gr-nav-link:hover{color:var(--text);background:var(--card2)}
.gr-nav-link-score{background:rgba(0,152,98,.1);color:var(--green-lt);
  border:1px solid rgba(0,152,98,.2);font-weight:600}
.gr-nav-link-score:hover{background:rgba(0,152,98,.18);color:#fff}
@media(max-width:600px){
  .gr-nav-inner{padding:0 16px}
  .gr-nav-link{font-size:.78rem;padding:5px 8px}
  .gr-nav-link:nth-child(2){display:none}
}

/* FOND SUBTIL — montagnes ambrées */
.bg{position:fixed;inset:0;z-index:0}
.bg svg{width:100%;height:100%;object-fit:cover}
.bg-overlay{position:fixed;inset:0;z-index:1;
  background:linear-gradient(to bottom,rgba(9,9,11,.4) 0%,rgba(9,9,11,.2) 40%,rgba(9,9,11,.7) 75%,rgba(9,9,11,.95) 100%)}

#app{position:relative;z-index:2;width:100%;max-width:720px;margin:0 auto;
  padding:84px 16px 60px;animation:fadeUp .8s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* HEADER PAGE */
.eyebrow{font-size:.72rem;letter-spacing:.2em;color:var(--amber);
  text-transform:uppercase;font-weight:600;margin-bottom:10px;text-align:center}
h1{font-size:clamp(2rem,6vw,2.8rem);font-weight:800;letter-spacing:-.03em;
  color:#fff;text-align:center;margin-bottom:10px;line-height:1.1}
h1 em{color:var(--amber-lt);font-style:normal}
.sub{font-size:.92rem;color:var(--muted);line-height:1.6;
  text-align:center;margin-bottom:24px;max-width:480px;margin-left:auto;margin-right:auto}

/* QUICK STATS */
.quick-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.qs-card{background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:16px 10px;text-align:center;transition:border-color .2s}
.qs-card:hover{border-color:var(--border2)}
.qs-val{font-size:1.6rem;font-weight:800;letter-spacing:-.03em;
  color:var(--amber);display:block;line-height:1}
.qs-lbl{font-size:.65rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);margin-top:6px;display:block}

/* LÉGENDE */
.legend{display:flex;align-items:center;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:.72rem;
  font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.legend-sq{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* GRILLE */
.grid-wrapper{width:100%;margin-bottom:28px}
.grid-section{display:flex;flex-direction:column;align-items:flex-start;
  width:fit-content;margin:0 auto}
.grid-year-row{display:flex;align-items:center;gap:var(--sq-gap);
  height:calc(var(--sq-size) + 1px)}
.grid-year-row.gap-5{margin-top:4px}
.grid-year-label{font-size:.65rem;font-weight:600;
  color:rgba(245,158,11,.2);letter-spacing:.02em;
  width:24px;flex-shrink:0;text-align:right;padding-right:4px}
.grid-year-label.visible{color:rgba(253,230,138,.55)}
.grid-weeks{display:flex;flex-wrap:nowrap;gap:var(--sq-gap)}
.sq{width:var(--sq-size);height:var(--sq-size);border-radius:1px;flex-shrink:0}
.sq-done{background:var(--amber-dk)}
.sq-current{background:var(--amber-lt);box-shadow:0 0 4px rgba(253,230,138,.6)}
.sq-left{background:#18181b;border:1px solid #27272a}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sq-current{animation:pulse 2s ease infinite}

/* CITATION */
.citation{background:rgba(245,158,11,.06);border-left:3px solid var(--amber);
  border-radius:0 12px 12px 0;padding:14px 18px;margin:24px 0;
  font-style:italic;font-size:.9rem;color:rgba(253,230,138,.7);
  line-height:1.7;font-weight:500}
.citation-author{display:block;font-size:.72rem;color:var(--muted);
  margin-top:8px;font-style:normal;font-weight:600;letter-spacing:.04em}

/* STATS */
.life-stats-title{font-size:1rem;font-weight:700;letter-spacing:-.01em;
  color:var(--text);border-bottom:1px solid var(--border);
  padding-bottom:10px;margin-bottom:14px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px}
.stat-card{background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:16px 14px;transition:border-color .2s}
.stat-card:hover{border-color:var(--border2)}
.stat-card .s-val{font-size:1.6rem;font-weight:800;letter-spacing:-.03em;
  color:var(--text);display:block;line-height:1}
.stat-card .s-lbl{font-size:.7rem;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;color:var(--muted);margin-top:6px;display:block}
.stat-card .s-sub{font-size:.72rem;color:var(--dim);font-weight:500;margin-top:4px;line-height:1.4}
.stat-card-trail{border-color:rgba(245,158,11,.25);background:rgba(245,158,11,.04)}
.stat-card-trail .s-val{color:var(--amber-lt)}

/* BOUTONS */
.btns-wrap{display:flex;gap:10px;margin-top:8px}
.btn-main{flex:1;text-align:center;background:var(--amber);color:#000;
  text-decoration:none;padding:14px 16px;font-size:.95rem;font-weight:700;
  letter-spacing:-.01em;border-radius:12px;transition:all .2s;
  box-shadow:0 4px 16px rgba(245,158,11,.25);border:none;cursor:pointer;display:block}
.btn-main:hover{transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(245,158,11,.35);background:var(--amber-dk);color:#000}
.btn-secondary{flex:1;text-align:center;background:transparent;
  border:1px solid var(--border2);color:var(--text);text-decoration:none;
  padding:14px 16px;font-size:.95rem;font-weight:600;letter-spacing:-.01em;
  border-radius:12px;transition:all .2s;display:block}
.btn-secondary:hover{background:var(--card2);color:#fff}

/* NO DATA */
.no-data{text-align:center;padding:80px 20px;color:var(--muted)}
.no-data h2{font-size:1.6rem;font-weight:800;letter-spacing:-.02em;
  color:#fff;margin-bottom:14px}
.no-data p{font-size:.95rem;line-height:1.7;margin-bottom:24px}

/* FOOTER */
.gr-footer{background:var(--card);border-top:1px solid var(--border);
  padding:36px 24px;text-align:center;margin-top:40px;position:relative;z-index:2}
.gr-footer-inner{max-width:1024px;margin:0 auto}
.gr-footer-links{display:flex;align-items:center;justify-content:center;
  gap:6px;flex-wrap:wrap;margin-bottom:14px}
.gr-footer-link{font-size:.875rem;font-weight:500;color:var(--muted);
  text-decoration:none;padding:4px 8px;border-radius:6px;transition:color .2s}
.gr-footer-link:hover{color:var(--text)}
.gr-footer-sep{color:var(--dim);font-size:.75rem}
.gr-footer-copy{font-size:.8rem;color:var(--dim);line-height:1.6}
.gr-footer-copy a{color:var(--dim);text-decoration:none}
.gr-footer-copy a:hover{color:var(--muted)}

@media(max-width:600px){
  #app{padding:80px 14px 40px}
  .stats-grid{grid-template-columns:1fr 1fr}
  .quick-stats{grid-template-columns:1fr 1fr}
  .quick-stats .qs-card:last-child{grid-column:span 2}
  .btns-wrap{flex-direction:column}
}
</style>
</head>

<script>
function getParams(){
  var p=new URLSearchParams(window.location.search);
  return{age:parseInt(p.get('age'))||0,esperance:parseInt(p.get('esperance'))||0,trail:parseFloat(p.get('trail'))||2};
}
function fmt(n){return Math.round(n).toLocaleString('fr-FR')}

var citations=[
  {txt:"Tu pourrais quitter la vie à l'instant même. Laisse cela déterminer ce que tu fais, dis et penses.",aut:'Marc Aurèle'},
  {txt:"Ce n'est pas que nous ayons peu de temps à vivre, c'est que nous en perdons beaucoup.",aut:'Sénèque'},
  {txt:"Vis comme si tu mourais à chaque instant — parce que c'est exactement ce qui se passe.",aut:'Marc Aurèle'},
  {txt:'La mort sourit à tout le monde. Tout ce qu\'un homme peut faire, c\'est lui sourire en retour.',aut:'Marc Aurèle'},
  {txt:'Pendant que tu repousses ta vie, elle passe.',aut:'Sénèque — Lettres à Lucilius'},
  {txt:"La vie n'est pas courte. C'est nous qui la gaspillons.",aut:'Sénèque'},
  {txt:"Il n'y a qu'une seule façon de vivre longtemps — ne plus gaspiller une seule journée.",aut:'Épictète'},
  {txt:'Le moment présent aura toujours été.',aut:'Philosophie stoïcienne'},
  {txt:"N'agis pas comme si tu avais dix mille ans devant toi.",aut:'Marc Aurèle'},
];

function calcSqSize(){
  var w=window.innerWidth;
  var padding=32;
  var labelW=28;
  var gap=2;
  var weeks=52;
  var available=w-padding-labelW-(gap*weeks);
  var sq=Math.floor(available/weeks);
  return Math.max(4,Math.min(sq,11));
}

function render(){
  var p=getParams();
  var c=document.getElementById('content');
  if(!p.age||!p.esperance){
    c.innerHTML='<div class="no-data"><h2>Données manquantes</h2><p>Lance d\'abord la Montre de Vie pour générer ta grille personnalisée.</p><div class="btns-wrap" style="max-width:340px;margin:0 auto"><a href="/montre/" class="btn-main">Lancer la Montre</a><a href="/" class="btn-secondary">Accueil</a></div></div>';
    return;
  }

  var totalW=Math.round(p.esperance*52.18);
  var livedW=Math.round(p.age*52.18);
  var leftW=Math.max(totalW-livedW,0);
  var pct=Math.round((livedW/totalW)*100);
  var leftY=Math.max(p.esperance-p.age,0);
  var joursV=Math.round(p.age*365.25);
  var joursR=Math.round(leftW*7);
  var weR=Math.round(leftY*52);
  var etesR=Math.round(leftY);
  var trailR=Math.round(leftW*p.trail);
  var cite=citations[Math.floor(Math.random()*citations.length)];

  c.innerHTML=
    '<div class="eyebrow">Memento Mori</div>'+
    '<h1>Ta vie en <em>semaines</em></h1>'+
    '<p class="sub">Chaque carré = 1 semaine · '+fmt(totalW)+' semaines au total · '+pct+'% vécues</p>'+

    '<div class="quick-stats">'+
      '<div class="qs-card"><span class="qs-val">'+fmt(livedW)+'</span><span class="qs-lbl">Semaines vécues</span></div>'+
      '<div class="qs-card"><span class="qs-val">'+fmt(leftW)+'</span><span class="qs-lbl">Restantes</span></div>'+
      '<div class="qs-card"><span class="qs-val">'+pct+'%</span><span class="qs-lbl">Vie écoulée</span></div>'+
    '</div>'+

    '<div class="legend">'+
      '<div class="legend-item"><div class="legend-sq" style="background:#d97706"></div>Vécue</div>'+
      '<div class="legend-item"><div class="legend-sq" style="background:#fde68a"></div>En cours</div>'+
      '<div class="legend-item"><div class="legend-sq" style="background:#18181b;border:1px solid #27272a"></div>Restante</div>'+
    '</div>'+

    '<div class="citation">"'+cite.txt+'"<span class="citation-author">— '+cite.aut+'</span></div>'+

    '<div class="grid-wrapper"><div class="grid-section" id="gc"></div></div>'+

    '<div class="life-stats-title">Ta vie en chiffres</div>'+
    '<div class="stats-grid">'+
      '<div class="stat-card"><span class="s-val">'+fmt(joursV)+'</span><span class="s-lbl">Jours vécus</span><span class="s-sub">'+p.age+' ans</span></div>'+
      '<div class="stat-card"><span class="s-val">'+fmt(joursR)+'</span><span class="s-lbl">Jours restants</span><span class="s-sub">Estimation actuelle</span></div>'+
      '<div class="stat-card"><span class="s-val">'+fmt(weR)+'</span><span class="s-lbl">Week-ends restants</span><span class="s-sub">Chaque samedi compte</span></div>'+
      '<div class="stat-card"><span class="s-val">'+fmt(etesR)+'</span><span class="s-lbl">Étés restants</span><span class="s-sub">Chaque saison compte</span></div>'+
      '<div class="stat-card stat-card-trail"><span class="s-val">'+fmt(trailR)+'</span><span class="s-lbl">Sorties sport restantes</span><span class="s-sub">À '+p.trail+' sorties / semaine</span></div>'+
      '<div class="stat-card stat-card-trail"><span class="s-val">'+fmt(Math.round(trailR*12))+'</span><span class="s-lbl">Km parcourus restants</span><span class="s-sub">~12 km par sortie</span></div>'+
    '</div>'+

    '<div class="btns-wrap">'+
      '<a href="/montre/" class="btn-main">Voir mon décompte</a>'+
      '<a href="/" class="btn-secondary">Accueil</a>'+
    '</div>';

  buildGrid(p.esperance, livedW, totalW);
}

function buildGrid(esperance, livedW, totalW){
  var gc=document.getElementById('gc');
  if(!gc)return;
  var sq=calcSqSize();
  document.documentElement.style.setProperty('--sq-size',sq+'px');

  var html='';
  var wk=0;
  for(var yr=0;yr<esperance;yr++){
    var is5=(yr>0&&yr%5===0);
    var showLbl=(yr===0||yr%5===0);
    html+='<div class="grid-year-row'+(is5?' gap-5':'')+'">';
    html+='<div class="grid-year-label'+(showLbl?' visible':'')+'">'+(showLbl?yr:'')+'</div>';
    html+='<div class="grid-weeks">';
    for(var w=0;w<52;w++){
      wk++;
      var cls = wk===livedW ? 'sq sq-current' : 'sq sq-left';
      html+='<div class="'+cls+'" data-week="'+wk+'"></div>';
    }
    html+='</div></div>';
  }
  gc.innerHTML=html;

  // Animation : remplir les carrés vécus progressivement
  if(livedW > 0){
    var delay = 800 / livedW;
    delay = Math.max(delay, 0.5);
    var squares = gc.querySelectorAll('.sq-left, .sq-current');
    var i = 0;
    function fillNext(){
      if(i >= squares.length) return;
      var sq = squares[i];
      var week = parseInt(sq.getAttribute('data-week'));
      if(week < livedW){
        sq.classList.remove('sq-left');
        sq.classList.add('sq-done');
        i++;
        setTimeout(fillNext, delay);
      }
    }
    setTimeout(fillNext, 300);
  }
}

window.addEventListener('DOMContentLoaded',render);
window.addEventListener('resize',function(){
  var sq=calcSqSize();
  document.documentElement.style.setProperty('--sq-size',sq+'px');
});
</script>
